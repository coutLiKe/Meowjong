<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meowjong — 3D concept drafts</title>
<style>
/* ============================================================
   DRAFT / MOCKUP ONLY — not production code.
   Three "more 3D" directions for the Meowjong table, using the
   real tile artwork (faces.js). Flip variants with the top bar.
   ============================================================ */
:root {
  --bg: #f7ead7;
  --felt: #8fae7e;
  --felt-dark: #7a9a6a;
  --panel: #fffaf1;
  --ink: #4a3426;
  --accent: #e8895a;
  --accent-dark: #c96b3d;
  --tile-edge: #d9c8a9;

  /* scene parameters (overridden per variant) */
  --tilt: 14deg;        /* board rotateX */
  --standf: 0.85;       /* how upright hand tiles counter-rotate (0..1) */
  --ry: 0deg;           /* parallax yaw   (JS) */
  --rxd: 0deg;          /* parallax pitch delta (JS) */
  --persp: 1300px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Avenir Next", "Segoe UI", ui-rounded, system-ui, sans-serif;
  color: var(--ink);
  background: var(--bg);
  overflow-x: hidden;
}

/* ---------- draft chrome (switcher) ---------- */
#bar {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  padding: 10px 18px;
  background: var(--ink); color: #f7ead7;
  position: sticky; top: 0; z-index: 40;
}
#bar h1 { font-size: 15px; margin: 0 8px 0 0; }
#bar h1 small { opacity: .6; font-weight: 500; }
.vbtn {
  font-family: inherit; font-size: 13px; font-weight: 700;
  border: none; border-radius: 16px; padding: 7px 15px; cursor: pointer;
  background: #6b5240; color: #fff3e0;
}
.vbtn.on { background: var(--accent); color: #fff; }
#bar label { font-size: 12px; display: inline-flex; align-items: center; gap: 7px; margin-left: auto; }
#bar input[type=range] { accent-color: var(--accent); width: 130px; }
#vdesc {
  font-size: 12.5px; padding: 8px 18px; background: #fdf3dd;
  border-bottom: 1px solid #eadfc6; line-height: 1.5;
}
#vdesc b { color: var(--accent-dark); }

/* ---------- the stage (room behind the floating table) ---------- */
#stage {
  min-height: calc(100vh - 96px);
  padding: 30px 10px 60px;
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(255, 236, 200, .55), transparent 55%),
    radial-gradient(90% 70% at 50% 108%, rgba(58, 40, 28, .5), transparent 60%),
    linear-gradient(178deg, #e9d6ba 0%, #d9bf9c 45%, #b99a74 100%);
  display: flex; justify-content: center;
}
.scene {
  perspective: var(--persp);
  perspective-origin: 50% 26%;
  width: min(1150px, 98vw);
}
#board {
  transform-style: preserve-3d;
  transform: rotateX(calc(var(--tilt) + var(--rxd))) rotateY(var(--ry));
  transform-origin: 50% 62%;
  transition: transform .25s cubic-bezier(.22,.61,.36,1);
  display: grid;
  grid-template-areas:
    ".    top   ."
    "left felt  right"
    "hand hand  hand";
  grid-template-columns: minmax(120px, 170px) minmax(0,1fr) minmax(120px, 170px);
  gap: 14px;
  align-items: center;
}
#board, #board * { backface-visibility: hidden; }
.seat, #felt, #hand-zone, .seat > *, #felt > * { transform-style: preserve-3d; }

/* ---------- seat chips ---------- */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12.5px; font-weight: 700;
  background: var(--panel);
  border-radius: 12px; padding: 5px 12px;
  box-shadow: 0 4px 10px rgba(40,26,14,.28);
  margin-bottom: 9px;
}
.chip .pts { font-weight: 500; font-size: 11px; background: #f0e4cf; border-radius: 8px; padding: 1px 7px; }
.seat { text-align: center; }
.seat-top   { grid-area: top; transform: translateZ(-46px); }
.seat-left  { grid-area: left;  transform: translateZ(-18px); }
.seat-right { grid-area: right; transform: translateZ(-18px); }
.seat .rack { display: flex; justify-content: center; gap: 3px; }
.seat-left .rack, .seat-right .rack { flex-direction: column; align-items: center; gap: 8px; }

/* ---------- the felt table ---------- */
#felt {
  grid-area: felt;
  justify-self: center;
  width: min(620px, 100%);
  aspect-ratio: 1.25 / 1;
  border-radius: 20px;
  padding: 14px 16px;
  position: relative;
  background:
    radial-gradient(110% 90% at 50% 26%, rgba(255, 246, 214, .55), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, var(--felt) 0%, var(--felt-dark) 100%);
  box-shadow:
    inset 0 3px 16px rgba(0,0,0,.25),
    0 0 0 7px #6b4f34,
    0 0 0 12px #8a6a45,
    0 1px 0 13px #5d4128,
    0 42px 60px -18px rgba(40, 26, 14, .6);
  display: flex; flex-direction: column;
}
#gold-line {
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: #fff; font-weight: 600;
  text-shadow: 0 1px 2px rgba(0,0,0,.35);
  background: rgba(0,0,0,.15);
  border: 1.5px dashed rgba(255, 216, 106, .75);
  border-radius: 10px; padding: 5px 10px; margin-bottom: 10px;
  align-self: flex-start;
  transform: translateZ(4px);
}
#river {
  flex: 1;
  display: flex; flex-wrap: wrap; gap: 7px 6px;
  align-content: flex-start;
  padding: 10px;
  background: rgba(0,0,0,.09);
  border-radius: 12px;
  transform: translateZ(1px);
}

/* ---------- the wall (variant B) ---------- */
.wall { position: absolute; display: none; gap: 2px; transform: translateZ(2px); }
body.v-b .wall { display: flex; }
.wall-top    { top: -34px; left: 6%; right: 6%; justify-content: center; }
.wall-left   { left: -30px; top: 8%; bottom: 8%; flex-direction: column; justify-content: center; }
.wall-right  { right: -30px; top: 8%; bottom: 8%; flex-direction: column; justify-content: center; }

/* ---------- tiles (adapted from the real game skin) ---------- */
.tile {
  width: 54px; height: 76px;
  background: linear-gradient(170deg, #fffef9, #f4efe2);
  border-radius: 8px;
  border: 1.5px solid var(--tile-edge);
  display: flex; align-items: center; justify-content: center;
  user-select: none; position: relative; flex-shrink: 0;
}
.tile .face-svg { width: 86%; height: 86%; display: block; }
.tile .corner {
  position: absolute; top: 1px; left: 3px;
  font-size: 10px; font-weight: 800; color: #a99f8c; line-height: 1;
  pointer-events: none;
}
.tile.small { width: 38px; height: 54px; border-radius: 6px; }
.tile.small .corner { font-size: 8px; }
.tile.mini  { width: 22px; height: 31px; border-radius: 4px; font-size: 10px; }
.tile.mini .corner { display: none; }
.tile.back {
  background: linear-gradient(160deg, #7fa877, #5d8556);
  color: rgba(255,255,255,.45);
  border-color: #4d6f47;
  display: flex; align-items: center; justify-content: center;
}
.tile.gold {
  background: linear-gradient(170deg, #fff8e1, #ffe9a8);
  border-color: #d4a017;
}

/* LYING tile: physical thickness reads as an extruded edge below the face
   (ivory side, then the green back peeking out), plus a contact shadow. */
.lay {
  box-shadow:
    0 1.5px 0 #efe6cf,
    0 3px 0 #d9cbab,
    0 5px 0 #b5cfae,
    0 6.5px 0 #93b28b,
    0 11px 9px rgba(30, 20, 10, .38);
}
.lay.gold {
  box-shadow:
    0 1.5px 0 #f4e6b6,
    0 3px 0 #e3c877,
    0 5px 0 #c8a23c,
    0 6.5px 0 #a8862e,
    0 11px 10px rgba(120, 80, 0, .4);
}
.lay.back {
  box-shadow:
    0 1.5px 0 #6d955f,
    0 3px 0 #55804a,
    0 5px 0 #40653a,
    0 6.5px 0 #35542f,
    0 10px 8px rgba(30, 20, 10, .4);
}
.lay.glow { outline: 3px solid #ffd65a; box-shadow: 0 1.5px 0 #efe6cf, 0 3px 0 #d9cbab, 0 5px 0 #b5cfae, 0 6.5px 0 #93b28b, 0 0 18px 5px rgba(255,214,90,.75), 0 11px 9px rgba(30,20,10,.38); }

/* sideways lying tiles for the left/right seats */
.turn-l { transform: rotate(90deg); }
.turn-r { transform: rotate(-90deg); }

/* STANDING tile: counter-rotates against the board tilt so it faces you. */
.standwrap { transform-style: preserve-3d; position: relative; }
.standwrap .tile {
  transform: rotateX(calc((var(--tilt) + var(--rxd)) * -1 * var(--standf)));
  transform-origin: 50% 100%;
  transition: transform .25s cubic-bezier(.22,.61,.36,1);
  box-shadow:
    0 2px 0 #e8dcc0,
    0 4px 0 #cbb894,
    0 6px 0 #9ec297,
    0 7.5px 0 #86a67e,
    0 16px 12px rgba(30, 20, 10, .42);
}
.standwrap .tile.back {
  box-shadow:
    0 2px 0 #6d955f,
    0 4px 0 #55804a,
    0 6px 0 #40653a,
    0 7.5px 0 #35542f,
    0 14px 10px rgba(30, 20, 10, .45);
}

/* ---------- your hand ---------- */
#hand-zone {
  grid-area: hand;
  justify-self: center;
  margin-top: 26px;
  text-align: center;
  transform: translateZ(56px);
}
#hand {
  display: flex; gap: 6px; align-items: flex-end; justify-content: center;
  padding: 6px 10px 2px;
}
#hand .standwrap { cursor: pointer; }
#hand .standwrap .tile { transition: transform .18s cubic-bezier(.22,.61,.36,1), box-shadow .18s ease; }
#hand .standwrap:hover .tile {
  transform:
    rotateX(calc((var(--tilt) + var(--rxd)) * -1 * var(--standf)))
    translateY(-14px) scale(1.05);
  box-shadow:
    0 2px 0 #e8dcc0, 0 4px 0 #cbb894, 0 6px 0 #9ec297, 0 7.5px 0 #86a67e,
    0 30px 20px rgba(30, 20, 10, .38);
}
#hand .drawn { margin-left: 20px; }
#dock {
  display: inline-flex; gap: 10px; margin-top: 16px;
  transform: translateZ(10px);
}
.abtn {
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; border-radius: 12px; padding: 9px 18px; cursor: pointer;
  background: var(--panel); color: var(--ink);
  box-shadow: 0 5px 12px rgba(40,26,14,.3);
}
.abtn.primary { background: var(--accent); color: #fff; }

/* ---------- discard flight ghost (screen-space, like fx.js) ---------- */
.ghost {
  position: fixed; z-index: 90; margin: 0; pointer-events: none;
  transition: transform .42s cubic-bezier(.22,.61,.36,1);
  transform-origin: top left; will-change: transform;
}

/* ---------- variant tuning ---------- */
body.v-a { --tilt: 14deg; --standf: 0.85; --persp: 1400px; }
body.v-b { --tilt: 24deg; --standf: 0.92; --persp: 1150px; }
body.v-c { --tilt: 6deg;  --standf: 0.3;  --persp: 1600px; }
body.v-b #felt { aspect-ratio: 1.35 / 1; }
body.v-b .seat-top { transform: translateZ(-70px) scale(.96); }
body.v-c .seat-top, body.v-c .seat-left, body.v-c .seat-right { transform: translateZ(-10px); }
body.v-c #hand-zone { transform: translateZ(26px); }
body.v-c #stage { padding-top: 16px; }

.note { text-align: center; font-size: 11.5px; opacity: .65; margin-top: 26px; }
</style>
</head>
<body class="v-a">

<header id="bar">
  <h1>🀄 Meowjong <small>— 3D concept drafts</small></h1>
  <button class="vbtn on" data-v="a">A · Lean-in table</button>
  <button class="vbtn" data-v="b">B · Full diorama</button>
  <button class="vbtn" data-v="c">C · Parallax depth</button>
  <label>Tilt <input type="range" id="tilt" min="0" max="30" step="1" value="14"> <span id="tiltv">14°</span></label>
</header>
<div id="vdesc"></div>

<main id="stage">
  <div class="scene" id="scene">
    <div id="board">

      <section class="seat seat-top">
        <div class="chip">🐈‍⬛ Biscuit <span class="pts">500 pts</span></div>
        <div class="rack" id="rack-top"></div>
      </section>

      <section class="seat seat-left">
        <div class="chip">🐅 Whiskers <span class="pts">460 pts</span></div>
        <div class="rack" id="rack-left"></div>
      </section>

      <section class="seat seat-right">
        <div class="chip">🐈 Mochi <span class="pts">480 pts</span></div>
        <div class="rack" id="rack-right"></div>
      </section>

      <section id="felt">
        <div class="wall wall-top" id="wall-top"></div>
        <div class="wall wall-left" id="wall-left"></div>
        <div class="wall wall-right" id="wall-right"></div>
        <div id="gold-line">🥇 <b>GOLD (wild):</b> <span id="gold-slot"></span></div>
        <div id="river"></div>
      </section>

      <section id="hand-zone">
        <div class="chip">😺 You · East <span class="pts">520 pts</span></div>
        <div id="hand"></div>
        <div id="dock">
          <button class="abtn primary">Discard</button>
          <button class="abtn">Hú! 胡</button>
        </div>
      </section>

    </div>
  </div>
</main>
<div class="note">Draft mockup · click a hand tile to preview the 3D discard flight · move the mouse for the parallax camera</div>

<script src="../js/tiles.js"></script>
<script src="../js/faces.js"></script>
<script>
"use strict";
/* ---------- variant switcher ---------- */
const VARIANTS = {
  a: { tilt: 14, ry: 2.4, desc: "<b>A · Lean-in table (recommended):</b> the whole board tilts back 14° inside a perspective camera. Tiles get physical thickness, your hand stands up to face you, opponents recede upstage. Closest to the current layout — lowest readability risk." },
  b: { tilt: 24, ry: 4.2, desc: "<b>B · Full diorama:</b> a strong 24° board-game camera with the live wall stacked around the felt, standing opponent racks, and a deeper room behind the floating table. Maximum drama; needs the most readability tuning." },
  c: { tilt: 6,  ry: 3.2, desc: "<b>C · Parallax depth:</b> keeps today's near-flat reading but adds tile thickness and a pointer-driven parallax camera — the scene subtly rotates with your mouse so depth reveals itself through motion, not a fixed tilt. Safest for mobile." },
};
let cur = "a";
function setVariant(v) {
  cur = v;
  document.body.className = "v-" + v;
  document.querySelectorAll(".vbtn").forEach(b => b.classList.toggle("on", b.dataset.v === v));
  document.getElementById("vdesc").innerHTML = VARIANTS[v].desc;
  const t = document.getElementById("tilt");
  t.value = VARIANTS[v].tilt;
  document.getElementById("tiltv").textContent = VARIANTS[v].tilt + "°";
  document.body.style.setProperty("--tilt", VARIANTS[v].tilt + "deg");
}
document.querySelectorAll(".vbtn").forEach(b => b.addEventListener("click", () => setVariant(b.dataset.v)));
document.getElementById("tilt").addEventListener("input", e => {
  document.body.style.setProperty("--tilt", e.target.value + "deg");
  document.getElementById("tiltv").textContent = e.target.value + "°";
});

/* ---------- tile builders (reuse the real face art) ---------- */
function T(kind, opts = {}) {
  const d = document.createElement("span");
  if (kind === null) {
    d.className = "tile back" + (opts.small ? " small" : "") + (opts.mini ? " mini" : "");
    d.textContent = "🀄";
  } else {
    d.className = "tile" + (opts.small ? " small" : "") + (opts.mini ? " mini" : "") + (opts.gold ? " gold" : "");
    d.innerHTML = `<span class="corner">${tileShort(kind)}</span>` + tileFaceSVG(kind);
  }
  if (opts.lay) d.classList.add("lay");
  if (opts.cls) d.className += " " + opts.cls;
  if (opts.stand) {
    const w = document.createElement("span");
    w.className = "standwrap";
    w.appendChild(d);
    return w;
  }
  return d;
}

const GOLD = 4; // 5 of Dots is today's gold

/* gold marker */
document.getElementById("gold-slot").appendChild(T(GOLD, { small: true, gold: true, lay: true }));

/* river */
const RIVER = [20, 3, 11, 27, 9, 25, 14, 2, 29, 18, 7, 16, 22, 0, 13, 26, 5];
const river = document.getElementById("river");
RIVER.forEach((k, i) => {
  const t = T(k, { small: true, lay: true, gold: k === GOLD });
  t.style.transform = "rotate(" + ((i * 37) % 5 - 2) * 0.7 + "deg)";
  if (i === RIVER.length - 1) t.classList.add("glow");
  river.appendChild(t);
});

/* opponents: top = standing backs; sides = sideways lying backs */
const rackTop = document.getElementById("rack-top");
for (let i = 0; i < 13; i++) rackTop.appendChild(T(null, { small: true, stand: true }));
for (const [id, turn] of [["rack-left", "turn-l"], ["rack-right", "turn-r"]]) {
  const el = document.getElementById(id);
  for (let i = 0; i < 5; i++) el.appendChild(T(null, { small: true, lay: true, cls: turn }));
}

/* wall (variant B) */
for (const [id, n, mini] of [["wall-top", 16, true], ["wall-left", 8, true], ["wall-right", 8, true]]) {
  const el = document.getElementById(id);
  for (let i = 0; i < n; i++) {
    const t = T(null, { mini: true, lay: true });
    if (id !== "wall-top") t.classList.add(id === "wall-left" ? "turn-l" : "turn-r");
    el.appendChild(t);
  }
}

/* your hand — 13 sorted + a drawn tile, standing toward the camera */
const HAND = [0, 1, 2, GOLD, 9, 10, 11, 13, 13, 18, 19, 20, 23];
const DRAWN = 24;
const hand = document.getElementById("hand");
HAND.forEach(k => hand.appendChild(T(k, { stand: true, gold: k === GOLD })));
const drawnW = T(DRAWN, { stand: true });
drawnW.classList.add("drawn");
hand.appendChild(drawnW);

/* ---------- parallax camera (pointer-driven) ---------- */
const board = document.getElementById("board");
let raf = null;
addEventListener("pointermove", e => {
  if (raf) return;
  raf = requestAnimationFrame(() => {
    raf = null;
    const amp = VARIANTS[cur].ry;
    const nx = e.clientX / innerWidth - 0.5, ny = e.clientY / innerHeight - 0.5;
    document.body.style.setProperty("--ry", (nx * amp * 2).toFixed(2) + "deg");
    document.body.style.setProperty("--rxd", (-ny * amp).toFixed(2) + "deg");
  });
}, { passive: true });

/* ---------- discard flight demo (screen-space ghost, like fx.js) ----------
   Proves the shipped FLIP/ghost approach still works under the 3D camera:
   getBoundingClientRect returns *projected* coords, so flights just work. */
document.getElementById("hand").addEventListener("click", e => {
  const w = e.target.closest(".standwrap");
  if (!w || document.querySelector(".ghost")) return;
  const tile = w.querySelector(".tile");
  const from = tile.getBoundingClientRect();
  const kind = HAND.concat(DRAWN)[[...hand.children].indexOf(w)];
  const dest = T(kind, { small: true, lay: true, gold: kind === GOLD });
  dest.style.visibility = "hidden";
  river.appendChild(dest);
  const to = dest.getBoundingClientRect();
  const ghost = T(kind, { gold: kind === GOLD });
  ghost.classList.add("ghost");
  ghost.style.left = from.left + "px"; ghost.style.top = from.top + "px";
  ghost.style.width = from.width + "px"; ghost.style.height = from.height + "px";
  document.body.appendChild(ghost);
  w.style.visibility = "hidden";
  void ghost.offsetWidth;
  ghost.style.transform = `translate(${to.left - from.left}px, ${to.top - from.top}px) scale(${to.width / from.width}, ${to.height / from.height}) rotate(4deg)`;
  setTimeout(() => {
    ghost.remove();
    dest.style.visibility = "";
    dest.classList.add("glow");
    river.querySelectorAll(".glow").forEach(g => { if (g !== dest) g.classList.remove("glow"); });
    setTimeout(() => { w.style.visibility = ""; dest.remove(); }, 1200); // draft: reset so you can replay
  }, 440);
});

setVariant("a");
</script>
</body>
</html>
